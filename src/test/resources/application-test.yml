spring:
  datasource:
    url: jdbc:h2:mem:stocktrace-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: true

stocktrace:
  scheduler:
    stock-scan:
      enabled: false
  ticker:
    enabled: false
