spring:
  datasource:
    url: jdbc:h2:mem:stocktrace-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: true

stocktrace:
  scheduler:
    stock-scan:
      enabled: false
  ticker:
    enabled: false
  auth:
    jwt:
      secret: test-secret-test-secret-test-secret-abcdefghij0123456789
      ttl-seconds: 3600
      issuer: stocktrace-test
  admin:
    email: ""
    password: ""
