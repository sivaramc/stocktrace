spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/stocktrace}
    username: ${DB_USERNAME:stocktrace}
    password: ${DB_PASSWORD:stocktrace}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    in.stocktrace: INFO
